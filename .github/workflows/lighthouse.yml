name: Lighthouse Audit

on:
  # Run after deploy completes
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Audit home page
        uses: treosh/lighthouse-ci-action@v12
        id: lighthouse-home
        with:
          urls: |
            https://pith-ui.github.io/
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Audit docs page
        uses: treosh/lighthouse-ci-action@v12
        id: lighthouse-docs
        with:
          urls: |
            https://pith-ui.github.io/docs/getting-started
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Audit component page
        uses: treosh/lighthouse-ci-action@v12
        id: lighthouse-component
        with:
          urls: |
            https://pith-ui.github.io/docs/components/dialog
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check accessibility scores
        run: |
          echo "## Lighthouse Accessibility Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse results from each audit
          for manifest in /tmp/lighthouse-ci-action/manifests/*.json; do
            if [ -f "$manifest" ]; then
              cat "$manifest" | jq -r '.[] | "| \(.url) | \(.summary.accessibility // "N/A") |"' >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full reports are available in the workflow artifacts." >> $GITHUB_STEP_SUMMARY
