name: Lighthouse Audit

on:
  # Run after deploy completes
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse audits
        uses: treosh/lighthouse-ci-action@v12
        id: lighthouse
        with:
          urls: |
            https://pith-ui.github.io/
            https://pith-ui.github.io/docs/getting-started
            https://pith-ui.github.io/docs/components/dialog
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check accessibility scores
        run: |
          echo "## Lighthouse Accessibility Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| URL | Accessibility |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---------------|" >> $GITHUB_STEP_SUMMARY

          # Parse results from the audit manifest
          MANIFEST='${{ steps.lighthouse.outputs.manifest }}'
          echo "$MANIFEST" | jq -r '.[] | "| \(.url) | \(.summary.accessibility // "N/A") |"' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full reports are available in the workflow artifacts." >> $GITHUB_STEP_SUMMARY
